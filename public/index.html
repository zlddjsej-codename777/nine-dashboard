<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>9호선 기관사 앱</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root{
  --gold:#C8A600;--gold-dim:#8a7200;--gold-bg:rgba(200,166,0,.13);
  --up:#C8A600;--down:#4A9EE8;
  --bg:#0b0f14;--bg2:#131920;--bg3:#1c2330;--bg4:#242e3d;
  --txt:#e8edf4;--txt2:#8fa0b4;--txt3:#4e6070;
  --red:#f04e4e;--green:#3cb96b;--orange:#e88a1a;
  --radius:12px;--radius-sm:8px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:-apple-system,'Noto Sans KR','Segoe UI',sans-serif}

/* ── 앱 레이아웃 ── */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
#header{background:var(--bg2);border-bottom:1.5px solid var(--gold);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-badge{width:32px;height:32px;border-radius:50%;background:var(--gold);color:#000;font-weight:900;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.app-title{font-size:15px;font-weight:700;color:var(--gold);flex:1}
.status-pill{display:flex;align-items:center;gap:5px;background:var(--bg3);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--txt2)}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 1.5s infinite}
.pulse.off{background:var(--red);animation:none}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── 탭 바 ── */
#tabBar{display:flex;background:var(--bg2);border-bottom:1px solid var(--bg4);flex-shrink:0}
.tab-btn{flex:1;padding:11px 4px 9px;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;color:var(--txt3);cursor:pointer;transition:color .2s;font-size:10px;border-bottom:2px solid transparent}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-icon{font-size:18px;line-height:1}

/* ── 페이지 컨테이너 ── */
#pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;display:none;-webkit-overflow-scrolling:touch}
.page.active{display:block}

/* ════════════════════════════════
   PAGE 1 — 실시간 노선도
════════════════════════════════ */
#mapPage{background:var(--bg)}

/* 상단 요약 카드 */
.summary-strip{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:12px 14px 0}
.s-card{background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius-sm);padding:8px 10px;text-align:center}
.s-val{font-size:17px;font-weight:700;color:var(--gold)}
.s-val.green{color:var(--green)}
.s-val.red{color:var(--red)}
.s-val.blue{color:var(--down)}
.s-label{font-size:9px;color:var(--txt3);margin-top:2px}

/* 내 열차 간격 패널 */
.gap-panel{margin:10px 14px 0;background:var(--bg2);border:1px solid var(--gold-dim);border-radius:var(--radius);padding:12px 14px}
.gap-panel-title{font-size:11px;color:var(--gold);font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.gap-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
.gap-box{background:var(--bg3);border-radius:var(--radius-sm);padding:10px 8px;text-align:center;border:1px solid var(--bg4)}
.gap-box.warn{border-color:var(--red)}
.gap-box.caution{border-color:var(--orange)}
.gap-box.ok{border-color:var(--green)}
.gap-dir{font-size:9px;color:var(--txt3);margin-bottom:3px}
.gap-time{font-size:18px;font-weight:800;line-height:1}
.gap-time.warn{color:var(--red)}
.gap-time.caution{color:var(--orange)}
.gap-time.ok{color:var(--green)}
.gap-stn{font-size:10px;color:var(--txt2);margin-top:3px}
.gap-stations{font-size:9px;color:var(--txt3);margin-top:1px}
.gap-me{display:flex;flex-direction:column;align-items:center;gap:2px}
.gap-me-badge{background:var(--gold);color:#000;font-size:9px;font-weight:900;border-radius:4px;padding:2px 6px}
.gap-me-stn{font-size:10px;color:var(--gold)}
.gap-arrow{color:var(--txt3);font-size:14px;text-align:center}

/* 범례 */
.legend{display:flex;gap:10px;padding:8px 14px 0;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--txt2)}
.lb{width:12px;height:7px;border-radius:2px}

/* 노선도 스크롤 영역 */
.map-scroll{overflow-x:auto;padding:8px 0 4px;-webkit-overflow-scrolling:touch}
.map-wrap{position:relative;padding:10px 20px 12px;min-width:1040px}
.track-up{position:absolute;left:30px;right:30px;height:4px;background:var(--up);top:66px;border-radius:2px;z-index:0}
.track-down{position:absolute;left:30px;right:30px;height:4px;background:var(--down);top:118px;border-radius:2px;z-index:0}
.track-lbl-up{position:absolute;left:4px;top:63px;font-size:8px;color:var(--up);font-weight:700}
.track-lbl-dn{position:absolute;left:4px;top:115px;font-size:8px;color:var(--down);font-weight:700}
.stations-row{display:flex;justify-content:space-between;position:relative;z-index:1}
.stn{display:flex;flex-direction:column;align-items:center;width:26px;cursor:pointer}
.stn-name{font-size:7.5px;color:var(--txt3);text-align:center;line-height:1.2;height:26px;display:flex;align-items:flex-end;justify-content:center;margin-bottom:3px;word-break:keep-all}
.stn-name.express{color:var(--txt2)}
.stn-circle{width:11px;height:11px;border-radius:50%;background:var(--bg);border:2px solid var(--up);margin:0 auto;transition:transform .2s}
.stn.express .stn-circle{background:var(--up);border-color:var(--up)}
.stn-circle.my-train-stn{border-color:var(--gold);box-shadow:0 0 6px var(--gold);background:var(--gold)}
.stn-bottom{height:34px}

/* 열차 마커 */
.train-marker{position:absolute;z-index:10;cursor:pointer;transition:left .8s cubic-bezier(.4,0,.2,1)}
.train-body{width:22px;height:12px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;color:#000;position:relative}
.train-body.up{background:var(--up)}
.train-body.down{background:var(--down);color:#fff}
.train-body.express-t{background:var(--red)!important;color:#fff!important}
.train-body.my{box-shadow:0 0 8px 3px rgba(255,220,0,.7);border:1.5px solid #fff}
.train-num{font-size:7px;color:var(--txt3);text-align:center;line-height:1;margin-top:1px}
.train-num.my{color:var(--gold);font-weight:700}

/* 도착정보 탭 */
.section-head{padding:10px 14px 4px;font-size:11px;color:var(--txt3);font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.arrival-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:4px 14px 14px}
.a-card{background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius-sm);padding:10px}
.a-card-head{display:flex;align-items:center;gap:4px;margin-bottom:6px}
.a-card-name{font-size:12px;font-weight:700;color:var(--txt)}
.exp-badge{background:var(--gold);color:#000;font-size:8px;padding:1px 4px;border-radius:3px;font-weight:700}
.a-item{display:flex;justify-content:space-between;align-items:center;font-size:10px;padding:3px 0;border-bottom:1px solid var(--bg3)}
.a-item:last-child{border:none}
.a-dir{color:var(--txt3)}
.a-time{font-weight:700}
.a-time.soon{color:var(--red)}
.a-time.med{color:var(--orange)}
.a-time.ok{color:var(--green)}

/* ════════════════════════════════
   PAGE 2 — 간격 상세
════════════════════════════════ */
.gap-detail-title{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:12px}
.gap-train-card{background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px}
.gtc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.gtc-num{font-size:12px;font-weight:700}
.gtc-type{font-size:10px;padding:2px 6px;border-radius:4px}
.gtc-type.up{background:rgba(200,166,0,.2);color:var(--up)}
.gtc-type.down{background:rgba(74,158,232,.2);color:var(--down)}
.gtc-type.express{background:rgba(240,78,78,.2);color:var(--red)}
.gap-metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.gm-box{background:var(--bg3);border-radius:6px;padding:8px;text-align:center}
.gm-val{font-size:14px;font-weight:700;color:var(--txt)}
.gm-lab{font-size:9px;color:var(--txt3);margin-top:2px}
.gap-warn-bar{background:rgba(240,78,78,.15);border:1px solid rgba(240,78,78,.4);border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:12px;color:var(--red);display:none;align-items:center;gap:6px}
.gap-warn-bar.show{display:flex}

/* ════════════════════════════════
   PAGE 2 — 근무현황
════════════════════════════════ */
#workPage{background:var(--bg);padding:14px}
.work-detail-title{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:10px}
.work-date-nav{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius-sm);padding:8px 10px;margin-bottom:10px}
.work-date-nav button{background:var(--bg3);border:1px solid var(--bg4);color:var(--txt);border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer}
.work-date-label{flex:1;text-align:center;font-size:13px;font-weight:700;color:var(--txt)}
.work-date-sub{font-size:10px;color:var(--txt3);text-align:center;margin-top:1px}
.work-summary-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.work-s-card{background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius-sm);padding:8px 4px;text-align:center}
.work-s-val{font-size:15px;font-weight:800}
.work-s-lab{font-size:8.5px;color:var(--txt3);margin-top:2px}
.work-search-wrap{display:flex;gap:6px;margin-bottom:8px}
.work-search{flex:1;background:var(--bg3);border:1px solid var(--bg4);color:var(--txt);border-radius:var(--radius-sm);padding:8px 10px;font-size:13px;outline:none}
.work-search:focus{border-color:var(--gold)}
.work-filter-chips{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px}
.work-filter-chips::-webkit-scrollbar{display:none}
.wf-chip{background:var(--bg3);border:1px solid var(--bg4);border-radius:20px;padding:4px 10px;font-size:10px;color:var(--txt2);cursor:pointer;white-space:nowrap;flex-shrink:0}
.wf-chip.active{background:var(--gold-bg);border-color:var(--gold);color:var(--gold);font-weight:700}
.work-card{background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius);padding:11px 13px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:border-color .2s}
.work-card:active{border-color:var(--gold)}
.wc-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.wc-info{flex:1;min-width:0}
.wc-name{font-size:13px;font-weight:700;color:var(--txt)}
.wc-sub{font-size:10px;color:var(--txt3);margin-top:1px}
.wc-status{font-size:12px;font-weight:800;padding:4px 10px;border-radius:8px;flex-shrink:0;text-align:center;min-width:52px}
.wc-status.work{background:rgba(200,166,0,.18);color:var(--gold)}
.wc-status.off{background:rgba(74,158,232,.18);color:var(--down)}
.wc-status.rest{background:rgba(232,138,26,.18);color:var(--orange)}
.wc-status.holi{background:rgba(240,78,78,.18);color:var(--red)}

/* 개인 상세 패널 */
.work-detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:150;display:none;align-items:flex-end;justify-content:center}
.work-detail-overlay.show{display:flex}
.work-detail-sheet{background:var(--bg2);border-radius:16px 16px 0 0;width:100%;max-width:480px;max-height:82vh;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.wd-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.wd-name{font-size:16px;font-weight:800;flex:1}
.wd-close{background:var(--bg3);border:1px solid var(--bg4);color:var(--txt);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer}
.wd-badge{font-size:10px;padding:3px 8px;border-radius:8px;background:var(--bg3);color:var(--txt2)}
.wd-week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:14px}
.wd-day{background:var(--bg3);border:1px solid var(--bg4);border-radius:8px;padding:7px 2px;text-align:center}
.wd-day.today{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}
.wd-day-date{font-size:9px;color:var(--txt3)}
.wd-day-wd{font-size:8px;color:var(--txt3);margin-bottom:3px}
.wd-day-val{font-size:11px;font-weight:800}
.wd-month-title{font-size:11px;color:var(--txt3);font-weight:700;margin:10px 0 6px;text-transform:uppercase;letter-spacing:.04em}
.wd-month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.wd-mday{background:var(--bg3);border-radius:6px;padding:5px 2px;text-align:center;font-size:9px}
.wd-mday-date{color:var(--txt3);font-size:8px}
.wd-mday-val{font-weight:700;margin-top:2px}

/* ════════════════════════════════
   PAGE 3 — PDF 매뉴얼
════════════════════════════════ */
#pdfPage{background:var(--bg);display:flex;flex-direction:column}
.pdf-toolbar{background:var(--bg2);border-bottom:1px solid var(--bg4);padding:10px 14px;flex-shrink:0}
.pdf-search-wrap{display:flex;gap:8px;margin-bottom:8px}
.pdf-search{flex:1;background:var(--bg3);border:1px solid var(--bg4);color:var(--txt);border-radius:var(--radius-sm);padding:9px 12px;font-size:13px;outline:none}
.pdf-search:focus{border-color:var(--gold)}
.pdf-search::placeholder{color:var(--txt3)}
.search-btn{background:var(--gold);color:#000;border:none;border-radius:var(--radius-sm);padding:9px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.pdf-file-tabs{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.pdf-file-tabs::-webkit-scrollbar{display:none}
.pdf-ftab{background:var(--bg3);border:1px solid var(--bg4);border-radius:20px;padding:4px 10px;font-size:10px;color:var(--txt2);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s}
.pdf-ftab.active{background:var(--gold-bg);border-color:var(--gold);color:var(--gold)}
.pdf-add-btn{background:var(--bg3);border:1px dashed var(--bg4);border-radius:20px;padding:4px 10px;font-size:10px;color:var(--txt3);cursor:pointer;white-space:nowrap;flex-shrink:0}

/* 검색 결과 */
.pdf-results{flex:1;overflow-y:auto;padding:10px 14px;-webkit-overflow-scrolling:touch}
.result-count{font-size:11px;color:var(--txt3);margin-bottom:8px}
.result-card{background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;cursor:pointer;transition:border-color .2s}
.result-card:active{border-color:var(--gold)}
.rc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.rc-file{font-size:10px;color:var(--gold);font-weight:700}
.rc-page{font-size:10px;color:var(--txt3);background:var(--bg3);border-radius:4px;padding:1px 6px}
.rc-text{font-size:12px;color:var(--txt2);line-height:1.6}
.rc-text mark{background:rgba(200,166,0,.35);color:var(--gold);border-radius:2px;padding:0 1px}
.pdf-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;color:var(--txt3)}
.pdf-empty-icon{font-size:36px;margin-bottom:12px}
.pdf-empty-title{font-size:14px;font-weight:700;color:var(--txt2);margin-bottom:6px}
.pdf-empty-desc{font-size:12px;line-height:1.6}

/* PDF 뷰어 */
.pdf-viewer-wrap{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;display:none}
.pdf-viewer-wrap.show{display:flex}
.pdf-viewer-header{background:var(--bg2);border-bottom:1px solid var(--bg4);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.pdf-viewer-back{background:var(--bg3);border:1px solid var(--bg4);color:var(--txt);border-radius:var(--radius-sm);padding:6px 12px;font-size:12px;cursor:pointer}
.pdf-viewer-title{font-size:13px;font-weight:700;color:var(--txt);flex:1}
.pdf-viewer-page{font-size:11px;color:var(--txt2)}
.pdf-canvas-wrap{flex:1;overflow:auto;display:flex;flex-direction:column;align-items:center;padding:10px;-webkit-overflow-scrolling:touch}
.pdf-canvas-wrap canvas{max-width:100%;border-radius:4px}
.pdf-nav{display:flex;justify-content:center;align-items:center;gap:14px;padding:10px;background:var(--bg2);border-top:1px solid var(--bg4);flex-shrink:0}
.pdf-nav-btn{background:var(--bg3);border:1px solid var(--bg4);color:var(--txt);border-radius:var(--radius-sm);padding:7px 16px;font-size:12px;cursor:pointer}
.pdf-nav-btn:disabled{opacity:.3;cursor:default}

/* 로딩 */
.loading-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:200;display:none}
.loading-overlay.show{display:flex}
.loading-box{background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius);padding:20px 28px;text-align:center}
.spinner{width:28px;height:28px;border:3px solid var(--bg4);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* 바텀 네비 */
#bottomNav{background:var(--bg2);border-top:1px solid var(--bg4);display:flex;padding-bottom:var(--safe-bottom);flex-shrink:0}

/* 스크롤바 */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}

/* 업로드 버튼 */
#pdfUpload{display:none}

.no-results{padding:20px;text-align:center;color:var(--txt3);font-size:13px}
</style>
</head>
<body>
<div id="app">

  <!-- 헤더 -->
  <div id="header">
    <div class="logo-badge">9</div>
    <div class="app-title">9호선 기관사 앱</div>
    <div class="status-pill">
      <div class="pulse" id="statusDot"></div>
      <span id="statusTxt">연결중...</span>
    </div>
    <div id="modeBadge" style="font-size:10px;padding:3px 8px;border-radius:10px;background:var(--bg3);color:var(--txt3);border:1px solid var(--bg4)">대기중</div>
  </div>

  <!-- 탭바 -->
  <div id="tabBar">
    <button class="tab-btn active" onclick="switchPage('map')" id="tab-map">
      <div class="tab-icon">🗺</div>노선도
    </button>
    <button class="tab-btn" onclick="switchPage('work')" id="tab-work">
      <div class="tab-icon">👷</div>근무현황
    </button>
    <button class="tab-btn" onclick="switchPage('pdf')" id="tab-pdf">
      <div class="tab-icon">📋</div>매뉴얼
    </button>
  </div>

  <!-- 페이지 영역 -->
  <div id="pages">

    <!-- ── PAGE 1: 실시간 노선도 ── -->
    <div class="page active" id="mapPage">

      <!-- 요약 카드 -->
      <div class="summary-strip">
        <div class="s-card">
          <div class="s-val" id="sumTrains">18</div>
          <div class="s-label">운행 열차</div>
        </div>
        <div class="s-card">
          <div class="s-val green" id="sumFront">-</div>
          <div class="s-label">전방 간격</div>
        </div>
        <div class="s-card">
          <div class="s-val blue" id="sumRear">-</div>
          <div class="s-label">후방 간격</div>
        </div>
      </div>

      <!-- 내 열차 간격 패널 -->
      <div class="gap-panel">
        <div class="gap-panel-title">🚇 내 열차 기준 간격</div>
        <div class="gap-row">

<script>
// ══════════════════════════════════════════════
//  9호선 역 데이터
// ══════════════════════════════════════════════
const STATIONS = [
  {n:'개화',c:'9001',e:true},{n:'김포공항',c:'9002',e:true},{n:'공항시장',c:'9003',e:false},
  {n:'신방화',c:'9004',e:false},{n:'마곡나루',c:'9005',e:true},{n:'양천향교',c:'9006',e:false},
  {n:'가양',c:'9007',e:true},{n:'증미',c:'9008',e:false},{n:'등촌',c:'9009',e:false},
  {n:'염창',c:'9010',e:false},{n:'신목동',c:'9011',e:false},{n:'선유도',c:'9012',e:false},
  {n:'당산',c:'9013',e:true},{n:'국회의사당',c:'9014',e:false},{n:'여의도',c:'9015',e:true},
  {n:'샛강',c:'9016',e:false},{n:'노량진',c:'9017',e:true},{n:'노들',c:'9018',e:false},
  {n:'흑석',c:'9019',e:false},{n:'동작',c:'9020',e:true},{n:'구반포',c:'9021',e:false},
  {n:'신반포',c:'9022',e:false},{n:'고속터미널',c:'9023',e:true},{n:'사평',c:'9024',e:false},
  {n:'신논현',c:'9025',e:true},{n:'언주',c:'9026',e:false},{n:'선정릉',c:'9027',e:false},
  {n:'삼성중앙',c:'9028',e:false},{n:'봉은사',c:'9029',e:false},{n:'종합운동장',c:'9030',e:true},
  {n:'삼전',c:'9031',e:false},{n:'석촌고분',c:'9032',e:false},{n:'석촌',c:'9033',e:true},
  {n:'송파나루',c:'9034',e:false},{n:'한성백제',c:'9035',e:false},{n:'올림픽공원',c:'9036',e:true},
  {n:'둔촌오륜',c:'9037',e:false},{n:'중앙보훈병원',c:'9038',e:true}
];

// ══════════════════════════════════════════════
//  시뮬레이션 상태
// ══════════════════════════════════════════════
const MY_TRAIN_ID = 'U1'; // 내 열차 ID
let simTrains = [];
let simTimer = null;
const N = STATIONS.length;

function initSim() {
  simTrains = [];
  // 상행 9대
  [0,4,8,12,16,20,24,28,33].forEach((pos,i) => {
    simTrains.push({
      id:'U'+(i+1), dir:'up', pos:pos+Math.random()*.5,
      express:i%3===0, num:`90${10+i}`, speed:i%3===0?.065:.038
    });
  });
  // 하행 9대
  [2,6,10,14,18,22,26,30,35].forEach((pos,i) => {
    simTrains.push({
      id:'D'+(i+1), dir:'down', pos:pos+Math.random()*.5,
      express:i%3===0, num:`91${10+i}`, speed:i%3===0?.065:.038
    });
  });
}

function stepSim() {
  simTrains.forEach(t => {
    if(t.dir==='up'){
      t.pos+=t.speed;
      if(t.pos>=N-1) t.pos=0;
    } else {
      t.pos-=t.speed;
      if(t.pos<=0) t.pos=N-1;
    }
  });
  renderMap();
  updateGapPanel();
  document.getElementById('lastUpd').textContent='갱신: '+new Date().toLocaleTimeString('ko-KR');
}

// ══════════════════════════════════════════════
//  노선도 렌더
// ══════════════════════════════════════════════
function renderStations() {
  document.getElementById('stationsRow').innerHTML = STATIONS.map((s,i)=>`
    <div class="stn ${s.e?'express':''}" id="stn_${i}">
      <div class="stn-name ${s.e?'express':''}">${s.n}</div>
      <div class="stn-circle"></div>
      <div class="stn-bottom"></div>
    </div>`).join('');
}

function getStationX(idx) {
  const wrap = document.getElementById('mapWrap');
  const nodes = document.querySelectorAll('.stn');
  if(!nodes[idx]) return 0;
  const wr = wrap.getBoundingClientRect();
  const nr = nodes[idx].getBoundingClientRect();
  return nr.left - wr.left + nr.width/2;
}

function renderMap() {
  const markers = document.getElementById('trainMarkers');
  markers.innerHTML='';
  simTrains.forEach(t=>{
    const idxF=Math.floor(t.pos);
    const idxC=Math.min(idxF+1,N-1);
    const frac=t.pos-idxF;
    const x=getStationX(idxF)+(getStationX(idxC)-getStationX(idxF))*frac;
    const isUp=t.dir==='up';
    const topPx=isUp?58:110;
    const isMy=t.id===MY_TRAIN_ID;
    const curStn=STATIONS[Math.round(t.pos)]||STATIONS[idxF];
    const div=document.createElement('div');
    div.className='train-marker';
    div.style.left=(x-11)+'px';
    div.style.top=topPx+'px';
    div.innerHTML=`
      <div class="train-body ${isUp?'up':'down'} ${t.express?'express-t':''} ${isMy?'my':''}">${isUp?'▶':'◀'}</div>
      <div class="train-num ${isMy?'my':''}">${isMy?'🚇':t.num}</div>`;
    markers.appendChild(div);
  });
}

// ══════════════════════════════════════════════
//  간격 계산
// ══════════════════════════════════════════════
function calcGaps(myTrain) {
  const myPos = myTrain.pos;
  const myDir = myTrain.dir;
  const sameDir = simTrains.filter(t=>t.id!==MY_TRAIN_ID && t.dir===myDir);

  let frontTrain=null, frontDist=Infinity;
  let rearTrain=null, rearDist=Infinity;

  sameDir.forEach(t=>{
    let d;
    if(myDir==='up'){
      // 상행: 위치가 큰 쪽이 전방(선행)
      d=t.pos-myPos;
      if(d<0) d+=N;
      if(d<frontDist){frontDist=d;frontTrain=t;}
      // 후방
      const dr=myPos-t.pos;
      const dr2=dr<0?dr+N:dr;
      if(dr2<rearDist){rearDist=dr2;rearTrain=t;}
    } else {
      // 하행: 위치가 작은 쪽이 전방
      d=myPos-t.pos;
      if(d<0) d+=N;
      if(d<frontDist){frontDist=d;frontTrain=t;}
      const dr=t.pos-myPos;
      const dr2=dr<0?dr+N:dr;
      if(dr2<rearDist){rearDist=dr2;rearTrain=t;}
    }
  });

  // 실질적 전방/후방 분리 (같은 방향 열차 중 정말 앞/뒤)
  let realFront=null, realFrontD=Infinity;
  let realRear=null, realRearD=Infinity;
  sameDir.forEach(t=>{
    if(myDir==='up'){
      let d=t.pos-myPos; if(d<=0) d+=N;
      if(d<N/2 && d<realFrontD){realFrontD=d;realFront=t;}
      let dr=myPos-t.pos; if(dr<=0) dr+=N;
      if(dr<N/2 && dr<realRearD){realRearD=dr;realRear=t;}
    } else {
      let d=myPos-t.pos; if(d<=0) d+=N;
      if(d<N/2 && d<realFrontD){realFrontD=d;realFront=t;}
      let dr=t.pos-myPos; if(dr<=0) dr+=N;
      if(dr<N/2 && dr<realRearD){realRearD=dr;realRear=t;}
    }
  });

  function distToTime(d){ return Math.round(d/0.04*0.8); }
  function distToStations(d){ return Math.max(0,Math.round(d)); }

  return {
    front: realFront ? {train:realFront, sec:distToTime(realFrontD), stns:distToStations(realFrontD)} : null,
    rear:  realRear  ? {train:realRear,  sec:distToTime(realRearD),  stns:distToStations(realRearD)}  : null
  };
}

function secToStr(sec){
  if(sec<60) return sec+'초';
  const m=Math.floor(sec/60), s=sec%60;
  return s>0?`${m}분${s}초`:`${m}분`;
}

function timeClass(sec){
  if(sec<90) return 'warn';
  if(sec<180) return 'caution';
  return 'ok';
}

function updateGapPanel() {
  const my = simTrains.find(t=>t.id===MY_TRAIN_ID);
  if(!my) return;
  const myIdx=Math.round(my.pos);
  document.getElementById('myStnName').textContent=STATIONS[Math.min(myIdx,N-1)].n;

  const g=calcGaps(my);

  if(g.front){
    const cls=timeClass(g.front.sec);
    const fi=document.getElementById('frontBox');
    fi.className='gap-box '+cls;
    document.getElementById('frontTime').className='gap-time '+cls;
    document.getElementById('frontTime').textContent=secToStr(g.front.sec);
    document.getElementById('frontStn').textContent=STATIONS[Math.min(Math.round(g.front.train.pos),N-1)].n;
    document.getElementById('frontStns').textContent=g.front.stns+'역 앞';
    document.getElementById('sumFront').textContent=secToStr(g.front.sec);
    document.getElementById('sumFront').className='s-val '+cls;
  }
  if(g.rear){
    const cls=timeClass(g.rear.sec);
    const ri=document.getElementById('rearBox');
    ri.className='gap-box '+cls;
    document.getElementById('rearTime').className='gap-time '+cls;
    document.getElementById('rearTime').textContent=secToStr(g.rear.sec);
    document.getElementById('rearStn').textContent=STATIONS[Math.min(Math.round(g.rear.train.pos),N-1)].n;
    document.getElementById('rearStns').textContent=g.rear.stns+'역 뒤';
    document.getElementById('sumRear').textContent=secToStr(g.rear.sec);
    document.getElementById('sumRear').className='s-val blue';
  }
}

// ══════════════════════════════════════════════
//  근무현황 페이지 — 엑셀 근무표 기반
// ══════════════════════════════════════════════
// WORK_DATA는 이 스크립트 하단의 별도 <script> 블록에서 정의됨
const WORK_COLOR_HEX = {
  '빨강':'#f04e4e','노랑':'#e8c22a','파랑':'#4A9EE8','초록':'#3cb96b',
  '남색':'#5b6ee8','살색':'#e8a97a','통상':'#8fa0b4'
};

function dateFromStart(offset){
  const d = new Date(WORK_DATA.startDate+'T00:00:00');
  d.setDate(d.getDate()+offset);
  return d;
}
function offsetFromStart(date){
  const start = new Date(WORK_DATA.startDate+'T00:00:00');
  const diff = Math.round((date-start)/86400000);
  return diff;
}
function fmtYMD(d){
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}
const WEEKDAY_KR=['일','월','화','수','목','금','토'];

let workViewOffset = 0; // 오늘 기준 상대 오프셋(일)
let workActiveColorFilter = '전체';

function todayOffset(){
  const now = new Date();
  const todayMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return offsetFromStart(todayMidnight);
}

function maskName(name){
  if(!name) return '(공석)';
  const s = String(name);
  if(s.length<=1) return s;
  if(s.length===2) return s[0]+'*';
  return s[0] + '*'.repeat(s.length-2) + s[s.length-1];
}

function classifyStatus(val){
  if(val==='비') return 'off';
  if(val==='휴') return 'rest';
  if(val==='토'||val==='일'||val==='공') return 'holi';
  return 'work'; // 숫자 근무코드
}
function statusLabel(val){
  const c = classifyStatus(val);
  if(c==='off') return '비번';
  if(c==='rest') return '휴무';
  if(c==='holi') return val==='공'?'공휴일':(val==='토'?'토요일':'일요일');
  return val; // 근무번호 그대로
}

function shiftWorkDate(delta){
  workViewOffset += delta;
  const max = WORK_DATA.employees[0].days.split(',').length - 1;
  workViewOffset = Math.max(0, Math.min(max, workViewOffset));
  renderWorkPage();
}
function resetWorkDateToday(){
  workViewOffset = Math.max(0, todayOffset());
  renderWorkPage();
}

function renderWorkFilterChips(){
  const chips = document.getElementById('workFilterChips');
  const colors = ['전체','빨강','노랑','파랑','초록','남색','살색','통상'];
  chips.innerHTML = colors.map(c=>`
    <div class="wf-chip ${workActiveColorFilter===c?'active':''}" onclick="setWorkFilter('${c}')">${c}</div>
  `).join('');
}
function setWorkFilter(c){
  workActiveColorFilter = c;
  renderWorkPage();
}

function sortKeyForVal(val){
  const st = classifyStatus(val);
  if(st!=='work') return 100000; // 비번/휴무/주말/공휴일은 맨 뒤로
  let iv = parseInt(val,10);
  if(iv>=200 && iv<=204) return iv; // 특수코드 201~204는 그대로
  if(iv>=600 && val.length>=3 && val.endsWith('0')) iv = iv/10; // 630 -> 63 (기준번호로 정렬)
  return iv;
}

function renderWorkPage(){
  if(workViewOffset===0 && !window._workDateInited){
    workViewOffset = Math.max(0, todayOffset());
    window._workDateInited = true;
  }
  const dateObj = dateFromStart(workViewOffset);
  document.getElementById('workDateLabel').textContent = fmtYMD(dateObj)+' ('+WEEKDAY_KR[dateObj.getDay()]+')';
  const diffDays = workViewOffset - todayOffset();
  document.getElementById('workDateSub').textContent = diffDays===0 ? '오늘' : (diffDays>0?`D+${diffDays}`:`D${diffDays}`);

  renderWorkFilterChips();

  const search = (document.getElementById('workSearchInput').value||'').trim();
  let list = WORK_DATA.employees.filter(e=>{
    if(workActiveColorFilter!=='전체' && e.color!==workActiveColorFilter) return false;
    if(search && !e.name.includes(search)) return false;
    return true;
  });
  list = list.map(e=>{
    const days = e.days.split(',');
    return {e, val: days[workViewOffset] ?? '-'};
  }).sort((a,b)=> sortKeyForVal(a.val)-sortKeyForVal(b.val))
    .map(x=>x.e);

  let cWork=0,cOff=0,cRest=0,cHoli=0;
  const cards = list.map(e=>{
    const days = e.days.split(',');
    const val = days[workViewOffset] ?? '-';
    const st = classifyStatus(val);
    if(st==='work') cWork++; else if(st==='off') cOff++; else if(st==='rest') cRest++; else cHoli++;
    const hex = WORK_COLOR_HEX[e.color]||'#8fa0b4';
    const nameDisp = maskName(e.name);
    return `<div class="work-card" onclick="openWorkDetail(${e.no})">
      <div class="wc-dot" style="background:${hex}"></div>
      <div class="wc-info">
        <div class="wc-name">${nameDisp}</div>

function openWorkDetail(no){
  const e = WORK_DATA.employees.find(x=>x.no===no);
  if(!e) return;
  const days = e.days.split(',');
  document.getElementById('wdName').textContent = maskName(e.name);
  document.getElementById('wdBadge').textContent = `${e.group} · ${e.color}`;

  // 이번 주 (오늘 기준 -3 ~ +3)
  const center = todayOffset();
  const weekGrid = document.getElementById('wdWeekGrid');
  let weekHtml='';
  for(let i=-3;i<=3;i++){
    const off = center+i;
    if(off<0||off>=days.length){ weekHtml+=`<div class="wd-day"></div>`; continue; }
    const d = dateFromStart(off);
    const val = days[off];
    const st = classifyStatus(val);
    const color = st==='work'?'var(--gold)':st==='off'?'var(--down)':st==='rest'?'var(--orange)':'var(--red)';
    weekHtml+=`<div class="wd-day ${i===0?'today':''}">
      <div class="wd-day-date">${d.getMonth()+1}/${d.getDate()}</div>
      <div class="wd-day-wd">${WEEKDAY_KR[d.getDay()]}</div>
      <div class="wd-day-val" style="color:${color}">${statusLabel(val)}</div>
    </div>`;
  }
  weekGrid.innerHTML = weekHtml;

  // 이번 달 (현재 보고 있는 날짜가 속한 달 전체)
  const viewDate = dateFromStart(workViewOffset);
  const y=viewDate.getFullYear(), m=viewDate.getMonth();
  const firstOfMonth = new Date(y,m,1);
  const daysInMonth = new Date(y,m+1,0).getDate();
  const monthGrid = document.getElementById('wdMonthGrid');
  let monthHtml='';
  // 앞쪽 빈칸 (요일 맞춤)
  for(let i=0;i<firstOfMonth.getDay();i++) monthHtml+=`<div></div>`;
  for(let dnum=1;dnum<=daysInMonth;dnum++){
    const off = offsetFromStart(new Date(y,m,dnum));
    if(off<0||off>=days.length){ monthHtml+=`<div class="wd-mday"><div class="wd-mday-date">${dnum}</div></div>`; continue; }
    const val = days[off];
    const st = classifyStatus(val);
    const color = st==='work'?'var(--gold)':st==='off'?'var(--down)':st==='rest'?'var(--orange)':'var(--red)';
    monthHtml+=`<div class="wd-mday" style="${off===center?'border:1px solid var(--gold)':''}">
      <div class="wd-mday-date">${dnum}</div>
      <div class="wd-mday-val" style="color:${color}">${val}</div>
    </div>`;
  }
  monthGrid.innerHTML = monthHtml;

  document.getElementById('workDetailOverlay').classList.add('show');
}
function closeWorkDetail(){
  document.getElementById('workDetailOverlay').classList.remove('show');
}

function renderArrival() {
  const KEY_STNS=[0,4,6,12,14,16,19,22,24,29];
  const grid=document.getElementById('arrivalGrid');
  grid.innerHTML=KEY_STNS.map(si=>{
    const s=STATIONS[si];
    const arrivals=[];
    simTrains.forEach(t=>{
      const isUp=t.dir==='up';
      let dist;
      if(isUp){dist=si-t.pos;if(dist<0)dist+=N;}
      else{dist=t.pos-si;if(dist<0)dist+=N;}
      if(dist>0&&dist<5){
        const sec=Math.round(dist/t.speed*.8);
        arrivals.push({dir:isUp?'→상행':'←하행',sec,num:t.num,express:t.express});
      }
    });
    arrivals.sort((a,b)=>a.sec-b.sec);
    const items=arrivals.slice(0,3).map(a=>{
      const cls=a.sec<60?'soon':a.sec<180?'med':'ok';
      return `<div class="a-item">
        <span class="a-dir">${a.dir}</span>
        <span class="a-time ${cls}">${secToStr(a.sec)}</span>
      </div>`;
    }).join('')||`<div class="a-item"><span class="a-dir" style="color:var(--txt3)">접근 없음</span></div>`;
    return `<div class="a-card">
      <div class="a-card-head">
        <div class="a-card-name">${s.n}</div>
        ${s.e?'<span class="exp-badge">급행</span>':''}
      </div>${items}</div>`;
  }).join('');
}

//  PDF 매뉴얼 시스템
// ══════════════════════════════════════════════
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdfFiles=[];       // {name, doc, pages:[{num,text}]}
let selectedFileIdx=-1;// -1=전체
let lastSearchTerm='';
let viewerDoc=null;
let viewerPage=1;
let viewerTotalPages=1;
let viewerFileName='';

// IndexedDB로 PDF 영속 저장
const DB_NAME='line9manual_db', DB_VER=1, STORE='pdfs';
let db=null;
function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>e.target.result.createObjectStore(STORE,{keyPath:'name'});
    req.onsuccess=e=>{db=e.target.result;res(db);};
    req.onerror=e=>rej(e);
  });
}
async function saveToDB(name,data){
  if(!db) await openDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction(STORE,'readwrite');
    tx.objectStore(STORE).put({name,data});
    tx.oncomplete=res; tx.onerror=rej;
  });
}
async function getAllFromDB(){
  if(!db) await openDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction(STORE,'readonly');
    const req=tx.objectStore(STORE).getAll();
    req.onsuccess=e=>res(e.target.result);
    req.onerror=rej;
  });
}
async function deleteFromDB(name){
  if(!db) await openDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction(STORE,'readwrite');
    tx.objectStore(STORE).delete(name);
    tx.oncomplete=res; tx.onerror=rej;
  });
}

async function loadPdfFromData(name, arrayBuffer) {
  const data=new Uint8Array(arrayBuffer);
  const doc=await pdfjsLib.getDocument({data}).promise;
  const pages=[];
  for(let i=1;i<=doc.numPages;i++){
    const pg=await doc.getPage(i);
    const content=await pg.getTextContent();
    const text=content.items.map(it=>it.str).join(' ');
    pages.push({num:i,text});
  }
  return {name,doc,pages};
}

async function handlePdfUpload(event) {
  const files=[...event.target.files];
  if(!files.length) return;
  document.getElementById('loadingOverlay').classList.add('show');
  for(const file of files){
    const alreadyExists=pdfFiles.find(p=>p.name===file.name);
    if(alreadyExists) continue;
    const ab=await file.arrayBuffer();
    const pdfObj=await loadPdfFromData(file.name,ab);
    pdfFiles.push(pdfObj);
    await saveToDB(file.name,ab);
  }
  document.getElementById('loadingOverlay').classList.remove('show');
  event.target.value='';
  rebuildFileTabs();
  updatePdfResultsArea();
}

async function loadSavedPdfs(){
  try{
    const saved=await getAllFromDB();
    if(!saved||!saved.length) return;
    document.getElementById('loadingOverlay').classList.add('show');
    for(const item of saved){
      const pdfObj=await loadPdfFromData(item.name,item.data);
      pdfFiles.push(pdfObj);
    }
    document.getElementById('loadingOverlay').classList.remove('show');
    rebuildFileTabs();
    updatePdfResultsArea();
  }catch(e){
    document.getElementById('loadingOverlay').classList.remove('show');
  }
}

function rebuildFileTabs(){
  const tabs=document.getElementById('pdfFileTabs');
  tabs.innerHTML=`<div class="pdf-ftab ${selectedFileIdx===-1?'active':''}" data-idx="-1" onclick="selectPdfFile(-1)">전체</div>`
    +pdfFiles.map((p,i)=>`
      <div class="pdf-ftab ${selectedFileIdx===i?'active':''}" data-idx="${i}" onclick="selectPdfFile(${i})">
        📄 ${p.name.replace('.pdf','')}
      </div>`).join('')
    +`<div class="pdf-add-btn" onclick="document.getElementById('pdfUpload').click()">+ 추가</div>`;
}

function selectPdfFile(idx){
  selectedFileIdx=idx;
  rebuildFileTabs();
  if(lastSearchTerm) searchPdf();
  else updatePdfResultsArea();
}

function updatePdfResultsArea(){
  const res=document.getElementById('pdfResults');
  if(!pdfFiles.length){
    res.innerHTML=`<div class="pdf-empty">
      <div class="pdf-empty-icon">📄</div>
      <div class="pdf-empty-title">PDF 매뉴얼을 등록하세요</div>
      <div class="pdf-empty-desc">+ 추가 버튼으로 고장 조치 매뉴얼 PDF를 추가하면<br>자동으로 저장되어 검색할 수 있습니다</div>
      <br><button class="search-btn" onclick="document.getElementById('pdfUpload').click()">+ PDF 추가</button>
    </div>`;
  } else {
    res.innerHTML=`<div class="pdf-empty">
      <div class="pdf-empty-icon">🔍</div>
      <div class="pdf-empty-title">${pdfFiles.length}개 파일 로드됨</div>
      <div class="pdf-empty-desc">키워드를 입력해서 매뉴얼 내용을 검색하세요</div>
    </div>`;
  }
}

function searchPdf(){
  const term=document.getElementById('pdfSearchInput').value.trim();
  if(!term){updatePdfResultsArea();return;}
  lastSearchTerm=term;
  const res=document.getElementById('pdfResults');

  if(!pdfFiles.length){
    res.innerHTML=`<div class="no-results">등록된 PDF가 없습니다. + 추가 버튼으로 매뉴얼을 등록하세요.</div>`;
    return;
  }

  const keywords=term.split(/\s+/).filter(Boolean);
  const results=[];

  const targetFiles=selectedFileIdx===-1?pdfFiles:[pdfFiles[selectedFileIdx]].filter(Boolean);

  targetFiles.forEach(pf=>{
    pf.pages.forEach(pg=>{
      const txt=pg.text;
      const lower=txt.toLowerCase();
      const matched=keywords.every(kw=>lower.includes(kw.toLowerCase()));
      if(matched){
        // 하이라이트 스니펫 추출
        const kw=keywords[0].toLowerCase();
        const idx=lower.indexOf(kw);
        const start=Math.max(0,idx-60);
        const end=Math.min(txt.length,idx+120);
        let snippet=txt.substring(start,end).trim();
        keywords.forEach(k=>{
          const re=new RegExp('('+k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
          snippet=snippet.replace(re,'<mark>$1</mark>');
        });
        if(start>0) snippet='...'+snippet;
        if(end<txt.length) snippet+='...';
        results.push({file:pf.name,page:pg.num,snippet,doc:pf.doc,fileName:pf.name});
      }
    });
  });

  if(!results.length){
    res.innerHTML=`<div class="no-results">"${term}"에 대한 검색 결과가 없습니다.<br><span style="font-size:11px;color:var(--txt3)">다른 키워드로 검색해보세요</span></div>`;
    return;
  }

  res.innerHTML=`<div class="result-count">"${term}" 검색결과 ${results.length}건</div>`
    +results.map((r,ri)=>`
    <div class="result-card" onclick="openPdfViewer(${ri})">
      <div class="rc-head">
        <span class="rc-file">📄 ${r.file.replace('.pdf','')}</span>
        <span class="rc-page">p.${r.page}</span>
      </div>
      <div class="rc-text">${r.snippet}</div>
    </div>`).join('');

  // 결과 데이터 저장 (뷰어 오픈용)
  window._searchResults=results;
}

function openPdfViewer(resultIdx){
  const r=window._searchResults[resultIdx];
  if(!r) return;
  viewerDoc=r.doc;
  viewerPage=r.page;
  viewerTotalPages=r.doc.numPages;
  viewerFileName=r.file;
  document.getElementById('pdfViewerTitle').textContent=r.file.replace('.pdf','');
  document.getElementById('pdfViewer').classList.add('show');
  renderPdfPage();
}

function closePdfViewer(){
  document.getElementById('pdfViewer').classList.remove('show');
}

async function renderPdfPage(){
  if(!viewerDoc) return;
  const wrap=document.getElementById('pdfCanvasWrap');
  wrap.innerHTML='<div style="color:var(--txt3);padding:20px;text-align:center">페이지 로딩 중...</div>';
  document.getElementById('pdfPageLabel').textContent=`${viewerPage} / ${viewerTotalPages}`;
  document.getElementById('prevPageBtn').disabled=viewerPage<=1;
  document.getElementById('nextPageBtn').disabled=viewerPage>=viewerTotalPages;

  const page=await viewerDoc.getPage(viewerPage);
  const vw=Math.min(window.innerWidth-20, 600);
  const viewport=page.getViewport({scale:vw/page.getViewport({scale:1}).width});
  const canvas=document.createElement('canvas');
  canvas.width=viewport.width;
  canvas.height=viewport.height;
  const ctx=canvas.getContext('2d');
  await page.render({canvasContext:ctx,viewport}).promise;
  wrap.innerHTML='';
  wrap.appendChild(canvas);
  wrap.scrollTop=0;
}

function changePdfPage(delta){
  const newPage=viewerPage+delta;
  if(newPage<1||newPage>viewerTotalPages) return;
  viewerPage=newPage;
  renderPdfPage();
}

// ══════════════════════════════════════════════
//  실제 API 연동 (Vercel 프록시 경유)
//  도착정보 API → 열차 위치 역방향 추론 방식
// ══════════════════════════════════════════════
let apiMode = false;
let apiTimer = null;
let apiWarning = '';

async function fetchRealTrains() {
  // AbortSignal.timeout() 대신 AbortController + setTimeout 사용
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 20000);
  try {
    const res = await fetch('/api/subway', { signal: controller.signal });
    clearTimeout(timer);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    apiWarning = data.warning || '';

    const trains = data.trains || [];
    if (!trains.length) {
      if (apiWarning) throw new Error(apiWarning);
      throw new Error('열차 데이터 없음');
    }
    return trains;
  } catch (e) {
    clearTimeout(timer);
    console.warn('[API] 실패:', e.message);
    return null;
  }
}

function setModeBadge(mode) {
  const badge = document.getElementById('modeBadge');
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusTxt');
  if (mode === 'real') {
    badge.textContent = '🔵 실시간';
    badge.style.cssText = 'font-size:10px;padding:3px 8px;border-radius:10px;background:rgba(74,158,232,.2);color:#4A9EE8;border:1px solid #4A9EE8';
    dot.className = 'pulse';
    txt.textContent = '실시간 연동';
  } else if (mode === 'sim') {
    badge.textContent = '🟡 시뮬';
    badge.style.cssText = 'font-size:10px;padding:3px 8px;border-radius:10px;background:rgba(200,166,0,.2);color:var(--gold);border:1px solid var(--gold-dim)';
    dot.className = 'pulse';
    txt.textContent = '시뮬레이션';
  } else {
    badge.textContent = '🔴 오프라인';
    badge.style.cssText = 'font-size:10px;padding:3px 8px;border-radius:10px;background:rgba(240,78,78,.15);color:var(--red);border:1px solid var(--red)';
    dot.className = 'pulse off';
    txt.textContent = '연결 실패';
  }
}

// 실제 API 데이터로 화면 갱신
function applyRealTrains(trains) {
  simTrains = trains;
  renderMap();
  updateGapPanel();
  if (document.getElementById('mapPage').classList.contains('active')) renderArrival();
  document.getElementById('sumTrains').textContent = trains.length;
  document.getElementById('lastUpd').textContent = '실시간 갱신: ' + new Date().toLocaleTimeString('ko-KR');
}

// 30초마다 실제 API 재호출
async function startRealMode() {
  clearInterval(simTimer);
  clearInterval(apiTimer);
  apiMode = true;

  const trains = await fetchRealTrains();
  if (trains) {
    applyRealTrains(trains);
    setModeBadge('real');
  } else {
    // 첫 호출 실패 → 시뮬레이션 폴백
    startSimFallback();
    return;
  }

  apiTimer = setInterval(async () => {
    const fresh = await fetchRealTrains();
    if (fresh) {
      applyRealTrains(fresh);
      setModeBadge('real');
    } else {
      setModeBadge('offline');
    }
  }, 30000);
}

// 시뮬레이션 폴백 (API 실패 시)
function startSimFallback() {
  apiMode = false;
  setModeBadge('sim');
  clearInterval(apiTimer);

  initSim();
  renderMap();
  updateGapPanel();
  renderArrival();

  simTimer = setInterval(() => {
    stepSim();
    if (document.getElementById('mapPage').classList.contains('active')) renderArrival();
  }, 900);
}

// ══════════════════════════════════════════════
//  초기화
// ══════════════════════════════════════════════
async function init() {
  renderStations();

  // 우선 시뮬레이션으로 화면 즉시 표시 (로딩 공백 방지)
  initSim();
  setTimeout(async () => {
    renderMap();
    updateGapPanel();
    renderArrival();

    // 실제 API 시도
    setModeBadge('sim');
    const trains = await fetchRealTrains();
    if (trains && trains.length > 0) {
      // 성공 → 실시간 모드 전환
      clearInterval(simTimer);
      applyRealTrains(trains);
      setModeBadge('real');
      apiTimer = setInterval(async () => {
        const fresh = await fetchRealTrains();
        if (fresh && fresh.length > 0) {
          applyRealTrains(fresh);
          setModeBadge('real');
        } else {
          setModeBadge('offline');
        }
      }, 30000);
    } else {
      // 실패 → 시뮬레이션 계속
      simTimer = setInterval(() => {
        stepSim();
        if (document.getElementById('mapPage').classList.contains('active')) renderArrival();
      }, 900);
    }
  }, 150);

  await openDB();
  await loadSavedPdfs();
}

init();
